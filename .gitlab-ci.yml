image: node:16

cache:
  paths:
    - admin/node_modules/
    - frontend/node_modules/

stages:
  - build

build-admin:
  stage: build
  script:
    - cd admin
    - npm install --legacy-peer-deps
    - npm run build

build-frontend:
  stage: build
  script:
    - cd frontend
    - npm install --legacy-peer-deps
